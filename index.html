<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mercury Logistics Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#0c5c5c; }
#map { height:100vh; }

.topbar{
  position:fixed; top:0; width:100%; height:60px;
  background:#f88973; color:white;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; z-index:1000;
}

.sidebar{
  position:fixed; top:60px; left:-280px;
  width:280px; height:calc(100% - 60px);
  background:#c5cbcb; padding:15px;
  transition:0.3s; overflow-y:auto; z-index:999;
}
.sidebar:hover{ left:0; }

.driver-card{
  background:white; border-radius:10px;
  padding:12px; margin-bottom:10px;
  border-left:6px solid #f88973;
  cursor:pointer;
}
.driver-card:hover{ background:#fff074; }

.status{ font-size:12px; color:#666; }

.dashboard{
  position:fixed;
  right:20px; top:80px;
  width:300px;
  background:white;
  border-radius:15px;
  padding:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
  z-index:1000;
}

.dashboard h3{
  margin-top:0;
  color:#f88973;
}

.metric{
  margin-bottom:15px;
}

.metric span{
  font-size:22px;
  font-weight:bold;
}

.progress{
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  background:#f88973;
  width:0%;
}

.alert{
  background:#fff074;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

.login-box{
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:white; padding:25px; border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
  z-index:2000;
}

input,button{
  width:100%; padding:10px; margin:10px 0;
}
button{ background:#f88973; color:white; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>
<body>

<div class="topbar">
  <h2>Mercury Logistics Platform</h2>
  <div id="userInfo">Not logged in</div>
</div>

<div class="sidebar">
  <h3>Drivers</h3>
  <div id="driverList"></div>
</div>

<div class="dashboard">
  <h3>Live Dashboard</h3>

  <div class="metric">Active Drivers: <span id="activeDrivers">0</span></div>
  <div class="metric">Total Drivers: <span id="totalDrivers">0</span></div>

  <div class="metric">Fleet Activity</div>
  <div class="progress"><div class="progress-bar" id="activityBar"></div></div>

  <div class="alert" id="alertBox">No alerts</div>
</div>

<div id="map"></div>

<div class="login-box" id="loginBox">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button id="loginBtn">Login</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC2N4rjxfdsjs0UV-LR7iZPgKWJWwvUVQw",
  authDomain: "mercury01-7b46d.firebaseapp.com",
  projectId: "mercury01-7b46d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const map = L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const markers = {};

document.getElementById("loginBtn").addEventListener("click", login);

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  console.log("Login clicked", email);

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  try {
    const res = await auth.signInWithEmailAndPassword(email, password);
    const uid = res.user.uid;

    console.log("Logged in:", uid);

    const doc = await db.collection("users").doc(uid).get();

    if (!doc.exists) {
      alert("No Firestore user found");
      return;
    }

    const user = doc.data();

    document.getElementById("userInfo").innerText =
      user.name + " (" + user.role + ")";

    document.getElementById("loginBox").style.display = "none";

    if (user.role === "driver") {
      startTracking(uid);
    }

    listenDrivers();

  } catch (e) {
    console.error(e);
    alert(e.message);
  }
}

function startTracking(id){
  navigator.geolocation.watchPosition(pos=>{
    db.collection("locations").doc(id).set({
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      updatedAt:Date.now()
    });
  });
}

function listenDrivers(){
  db.collection("locations").onSnapshot(snap=>{
    let active=0;
    let total=0;
    driverList.innerHTML='';

    snap.forEach(doc=>{
      const d=doc.data();
      total++;
      const online = Date.now()-d.updatedAt<10000;
      if(online) active++;

      updateMarker(doc.id,d.lat,d.lng);

      const card=document.createElement('div');
      card.className='driver-card';
      card.innerHTML=`<b>${doc.id}</b><div class='status'>${online?'Online':'Offline'}</div>`;
      card.onclick=()=>map.setView([d.lat,d.lng],15);
      driverList.appendChild(card);
    });

    activeDrivers.innerText=active;
    totalDrivers.innerText=total;

    const percent = total ? (active/total)*100 : 0;
    activityBar.style.width = percent+'%';

    alertBox.innerText = active===total ? 'All drivers active' : 'Some drivers offline';
  });
}

function updateMarker(id,lat,lng){
  if(!markers[id]){
    markers[id]=L.marker([lat,lng]).addTo(map);
  }else{
    markers[id].setLatLng([lat,lng]);
  }
}
</script>

</body>
</html>
